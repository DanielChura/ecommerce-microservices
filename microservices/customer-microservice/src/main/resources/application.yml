spring:
    application:
        name: customer-microservice

    mongodb:
        host: localhost
        port: 27017
        database: customer_db
        username: root
        password: pass
        authentication-database: admin

    config:
        import: optional:configserver:http://localhost:8888

logging:
    level:
        root: INFO
        "[com.daniel.microservices]": WARN

    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{20} - %msg%n"
        file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{20} - %msg%n"

    file:
        name: logs/customers-microservice.log
        max-size: 10MB
        max-files: 30

server:
    port: 8091
