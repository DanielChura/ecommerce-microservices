spring:
    application:
        name: product-microservice

    datasource:
        url: jdbc:postgresql://localhost:5432/product_db
        username: root
        password: pass
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
server:
    port: 8082
