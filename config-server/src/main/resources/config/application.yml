eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka

logging:
    level:
        root: INFO
    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{20} - %msg%n"
        file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{20} - %msg%n"
    file:
        name: logs/${spring.application.name}.log
        max-size: 10MB
        max-files: 30
