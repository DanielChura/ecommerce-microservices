spring:
  application:
    name: cart-microservice
  mongodb:
    uri: ${SPRING_MONGODB_URI}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

logging:
  level:
    root: INFO
    com.daniel.microservices: WARN

  file:
    name: /app/logs/cart-microservice.log

server:
  port: 8093
