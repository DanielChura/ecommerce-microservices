services:
  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always
    environment: 
      - MONGO_INITDB_DATABASE=customer_db
    networks:
      - microservices

  postgres-db:
    image: postgres:latest
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=product_db
      - PGDATA=/data/postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/data/postgres
    networks:
      - microservices

volumes:
  mongo-data:
  postgres-data:

networks:
  microservices:
    driver: bridge