services:
  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    ports:
      - "${MONGO_DB_PORT}:27017"
    volumes:
      - mongo-data:/data/db
    restart: always
    environment:   
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_DB_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_DB_PASSWORD}
    networks:
      - microservices

  config-server:
    build:
      context: .
      dockerfile: ./config-server/Dockerfile
    container_name: config-server
    restart: on-failure
    ports:
      - "${CONFIG_SERVER_PORT}:8888"
    networks:
      - microservices
    healthcheck:
      test: ["CMD", "curl", "-f", "http://config-server:${CONFIG_SERVER_PORT}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  discovery-server:
    container_name: discovery-server
    build:
      context: .
      dockerfile: ./discovery-server/Dockerfile
    restart: on-failure
    ports:
      - "${DISCOVERY_SERVER_PORT}:8761"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:${CONFIG_SERVER_PORT}
    networks:
      - microservices
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://discovery-server:${DISCOVERY_SERVER_PORT}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres-db:
    image: postgres:latest
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRESQL_DB_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRESQL_DB_PASSWORD}
      - POSTGRES_DB=${PRODUCT_DB_NAME}
      - PGDATA=/data/postgres
    ports:
      - "${POSTGRESQL_DB_PORT}:5432"
    volumes:
      - postgres-data:/data/postgres
    networks:   
      - microservices

  customer-microservice:
    container_name: customer-microservice
    build:
      context: . 
      dockerfile: ./microservices/customer-microservice/Dockerfile
    restart: on-failure
    ports:
      - "${CUSTOMER_MICROSERVICE_PORT}:8091"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mongo-db:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://customer-microservice:${CUSTOMER_MICROSERVICE_PORT}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:${CONFIG_SERVER_PORT}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:${DISCOVERY_SERVER_PORT}/eureka/
      - SPRING_MONGODB_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongo-db:${MONGO_DB_PORT}/${CUSTOMER_DB_NAME}?authSource=admin
    networks:
      - microservices

  product-microservice:
    container_name: product-microservice
    build:
      context: .
      dockerfile: ./microservices/product-microservice/Dockerfile
    restart: on-failure
    ports:
      - "${PRODUCT_MICROSERVICE_PORT}:8092"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://product-microservice:${PRODUCT_MICROSERVICE_PORT}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:${CONFIG_SERVER_PORT}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:${DISCOVERY_SERVER_PORT}/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:${POSTGRESQL_DB_PORT}/${PRODUCT_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${POSTGRESQL_DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRESQL_DB_PASSWORD}
    networks:
      - microservices

  cart-microservice:
    container_name: cart-microservice
    build:
      context: .
      dockerfile: ./microservices/cart-microservice/Dockerfile
    restart: on-failure
    ports:
      - "${CART_MICROSERVICE_PORT}:8093"
    depends_on:
      config-server:
        condition: service_started
      discovery-server:
        condition: service_started
      mongo-db:
        condition: service_started
    volumes:
      - ./microservices/cart-microservice/logs:/app/logs
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:${CONFIG_SERVER_PORT}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:${DISCOVERY_SERVER_PORT}/eureka/
      - SPRING_MONGODB_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongo-db:${MONGO_DB_PORT}/${CART_DB_NAME}?authSource=admin
    networks:
      - microservices
      
volumes:
  mongo-data:
  postgres-data:

networks:
  microservices:
    driver: bridge